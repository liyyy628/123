[build]
  builder = "nixpacks"
  buildCommand = "pip install -r requirements.txt"

[deploy]
  startCommand = "gunicorn app:app --bind 0.0.0.0:${PORT:-5000} --workers 1 --threads 4 --timeout 120 --worker-class gthread --preload --log-level info"
  healthcheckPath = "/"
  restartPolicyType = "always"

[service]
  port = 5000
