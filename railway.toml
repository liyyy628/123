[build]
  builder = "nixpacks"
  buildCommand = "pip install -r requirements.txt"

[deploy]
  startCommand = "gunicorn app:app --bind 0.0.0.0:${PORT:-5000} --workers 1 --threads 8 --timeout 120 --graceful-timeout 30 --worker-class gthread"
  healthcheckPath = "/api/health"
  restartPolicyType = "always"

[service]
  port = 5000
