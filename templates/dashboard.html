<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTC Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#06080b;color:#c8ccd4;min-height:100vh}
:root{
  --bg:#06080b;--bg2:#0b0e13;--bg3:#11151b;--bg4:#181c24;
  --g:#00dca6;--r:#ff4757;--y:#f0b90b;--b:#3b82f6;--p:#a78bfa;
  --t1:#e8ecf1;--t2:#6e7380;--t3:#3d414a;
  --br:rgba(255,255,255,0.05);--br2:rgba(255,255,255,0.08);
}

/* ── Top Bar ── */
.top{background:linear-gradient(180deg,#0d1117,#090c10);border-bottom:1px solid var(--br);padding:0 28px;height:64px;display:flex;align-items:center;gap:0}
.top-l{display:flex;align-items:center;gap:14px;flex:1}
.top-dot{width:10px;height:10px;border-radius:50%;background:var(--g);box-shadow:0 0 10px rgba(0,220,166,0.5);animation:glow 2s ease-in-out infinite}
@keyframes glow{50%{box-shadow:0 0 20px rgba(0,220,166,0.8)}}
.top-t{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.3px}
.top-t span{color:var(--t3);font-weight:400;font-size:10px;margin-left:8px;letter-spacing:1px}
.top-m{text-align:center;flex:1}
.top-pr{font-size:34px;font-weight:800;color:var(--t1);letter-spacing:-1.5px;font-variant-numeric:tabular-nums}
.top-ch{font-size:12px;font-weight:600;padding:4px 10px;border-radius:5px;display:inline-block;margin-top:2px}
.top-ch.up{background:rgba(0,220,166,0.1);color:var(--g)}.top-ch.down{background:rgba(255,71,87,0.1);color:var(--r)}
.top-r{display:flex;gap:24px;flex:1;justify-content:flex-end}
.top-st{text-align:center}.top-st .tv{font-size:15px;font-weight:700;color:var(--t1)}.top-st .tl{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}

/* ── Status strip ── */
.strip{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 0;font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--br)}
.strip-dot{width:5px;height:5px;border-radius:50%}
.strip-dot.live{background:var(--g);box-shadow:0 0 6px var(--g)}.strip-dot.warn{background:var(--y)}.strip-dot.dead{background:var(--r);animation:blink 0.7s infinite}@keyframes blink{50%{opacity:0.15}}

/* ── Main ── */
.main{max-width:1400px;margin:0 auto;padding:10px 20px 0}

/* ── Cards Row ── */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:var(--bg2);border:1px solid var(--br);border-radius:14px;padding:14px 18px;position:relative;overflow:hidden;transition:border-color 0.4s,box-shadow 0.4s}
.card::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;transition:all 0.5s}
.card.up::after{background:linear-gradient(90deg,transparent,var(--g),transparent);box-shadow:0 0 30px rgba(0,220,166,0.25)}
.card.down::after{background:linear-gradient(90deg,transparent,var(--r),transparent);box-shadow:0 0 30px rgba(255,71,87,0.25)}
.card.leaning_up::after{background:linear-gradient(90deg,transparent,rgba(0,220,166,0.3),transparent)}
.card.leaning_down::after{background:linear-gradient(90deg,transparent,rgba(255,71,87,0.3),transparent)}
.card.neutral::after{background:linear-gradient(90deg,transparent,rgba(240,185,11,0.3),transparent)}
.card.flash{animation:cardPop 0.45s ease-out}
@keyframes cardPop{0%{transform:scale(1.012)}100%{transform:scale(1)}}

.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-tf{font-size:10px;letter-spacing:3px;color:var(--t3);font-weight:600}
.card-vol{font-size:9px;padding:3px 8px;border-radius:10px;font-weight:600}
.card-vol.high{background:rgba(255,71,87,0.1);color:var(--r)}.card-vol.low{background:rgba(255,255,255,0.03);color:var(--t2)}

.card-body{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.card-arrow{font-size:36px;line-height:1;min-width:40px;text-align:center;transition:all 0.3s}
.card-arrow.up{color:var(--g);text-shadow:0 0 40px rgba(0,220,166,0.35)}
.card-arrow.down{color:var(--r);text-shadow:0 0 40px rgba(255,71,87,0.35)}
.card-arrow.leaning_up{color:#80edc0}.card-arrow.leaning_down{color:#ff99a8}.card-arrow.neutral{color:var(--y)}
.card-info{flex:1}
.card-label{font-size:16px;font-weight:700;margin-bottom:2px}
.card-label.up{color:var(--g)}.card-label.down{color:var(--r)}.card-label.leaning_up{color:#80edc0}.card-label.leaning_down{color:#ff99a8}.card-label.neutral{color:var(--y)}
.card-score{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px}
.card-score b{font-size:18px}

/* Confidence */
.card-cf{display:flex;align-items:center;gap:10px}
.card-cf-val{font-size:26px;font-weight:800;min-width:58px}
.card-cf-val.up{color:var(--g)}.card-cf-val.down{color:var(--r)}.card-cf-val.leaning_up{color:#80edc0}.card-cf-val.leaning_down{color:#ff99a8}.card-cf-val.neutral{color:var(--y)}
.card-cf-bar{flex:1;height:8px;border-radius:4px;background:var(--bg4);overflow:hidden}
.card-cf-fill{height:100%;border-radius:4px;transition:width 0.5s cubic-bezier(0.22,0.61,0.36,1)}
.card-cf-fill.up{background:linear-gradient(90deg,#0a6a3a,var(--g),#80ffc0);box-shadow:0 0 12px rgba(0,220,166,0.3)}
.card-cf-fill.down{background:linear-gradient(90deg,#6a1a2a,var(--r),#ff8099);box-shadow:0 0 12px rgba(255,71,87,0.3)}
.card-cf-fill.leaning_up{background:linear-gradient(90deg,#1a4a2a,#60c090)}
.card-cf-fill.leaning_down{background:linear-gradient(90deg,#4a1a2a,#e08090)}
.card-cf-fill.neutral{background:linear-gradient(90deg,#4a3a10,var(--y))}

/* ── Kline mini grid ── */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--br);border-radius:10px;overflow:hidden;margin-bottom:8px}
.kg-i{background:var(--bg3);padding:6px 4px;text-align:center}
.kg-i .kl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.kg-i .kv{font-size:13px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}

/* ── Factor bars ── */
.factors{display:flex;flex-direction:column;gap:1px}
.factor{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;transition:background 0.2s}
.factor:hover{background:var(--bg3)}
.factor-name{font-size:10px;font-weight:600;color:var(--t1);min-width:68px}
.factor-detail{font-size:9px;color:var(--t2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.factor-bar-wrap{width:80px;height:4px;border-radius:2px;background:var(--bg4);overflow:hidden}
.factor-bar{height:100%;border-radius:2px;transition:width 0.5s cubic-bezier(0.22,0.61,0.36,1)}
.factor-bar.up{background:linear-gradient(90deg,rgba(0,220,166,0.2),var(--g))}
.factor-bar.down{background:linear-gradient(90deg,var(--r),rgba(255,71,87,0.2))}
.factor-val{font-size:11px;font-weight:700;min-width:28px;text-align:right}
.factor-val.up{color:var(--g)}.factor-val.down{color:var(--r)}
.factor-val.bounce{animation:valBounce 0.4s ease-out}
@keyframes valBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── Charts Row ── */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.chart-box{background:var(--bg2);border:1px solid var(--br);border-radius:14px;padding:12px}
.chart-hd{font-size:10px;letter-spacing:3px;color:var(--t3);font-weight:600;margin-bottom:6px;text-transform:uppercase}
.chart-cv{width:100%!important;height:240px!important}

/* ── Bottom: Overview + History unified ── */
.bot{background:var(--bg2);border:1px solid var(--br);border-radius:14px;overflow:hidden}
.bot-top{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--br)}
.bot-i{background:var(--bg2);padding:12px;text-align:center;transition:background 0.2s}.bot-i:hover{background:var(--bg3)}
.bot-i .bv{font-size:15px;font-weight:700}.bot-i .bl{font-size:8px;color:var(--t2);margin-top:3px;text-transform:uppercase;letter-spacing:1.5px}
.bot-r2{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--br)}.bot-r2 .bot-i{border-top:1px solid var(--br)}
.bot-div{height:1px;background:var(--br);margin:0}
.bot-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 6px}
.bot-title{font-size:10px;letter-spacing:3px;color:var(--t3);font-weight:600;text-transform:uppercase}
.bot-acc{font-size:12px;font-weight:600;color:var(--t2)}.bot-acc b{font-size:22px}
.bot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 14px 12px}
.bot-card{background:var(--bg3);border-radius:10px;padding:10px;text-align:center;transition:transform 0.2s}.bot-card:hover{transform:translateY(-2px)}
.bot-time{font-size:9px;color:var(--t3);margin-bottom:6px}
.bot-arrow{font-size:24px;line-height:1.2}
.bot-dir{font-size:10px;color:var(--t2);margin-top:2px}
.bot-score{font-size:11px;font-weight:700;margin-top:2px}
.bot-result{margin-top:6px;border-radius:6px;padding:6px 0}
.bot-result.win{background:rgba(0,220,166,0.06)}.bot-result.lose{background:rgba(255,71,87,0.06)}
.bot-mark{font-size:22px;font-weight:800;line-height:1}.bot-mark.win{color:var(--g)}.bot-mark.lose{color:var(--r)}
.bot-sub{font-size:9px;font-weight:600}.bot-sub.win{color:var(--g)}.bot-sub.lose{color:var(--r)}
.bot-pct{font-size:10px;font-weight:600;margin-top:1px}.bot-pct.win{color:var(--g)}.bot-pct.lose{color:var(--r)}
.bot-pend{color:var(--t3);font-size:9px;margin-top:6px}

/* ── Footer ── */
.ft{text-align:center;padding:12px;color:var(--t3);font-size:8px;letter-spacing:2.5px;text-transform:uppercase}
.ft span{color:var(--t2)}

/* ── Loading ── */
.load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;flex-direction:column;gap:18px}
.load-ring{width:40px;height:40px;border:3px solid var(--br2);border-top-color:var(--y);border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:10px;color:var(--t2);letter-spacing:2px;text-transform:uppercase}

@media(max-width:900px){.cards,.charts,.bot-grid{grid-template-columns:1fr}.top{flex-wrap:wrap;height:auto;padding:14px 16px;gap:10px}.top-r{justify-content:flex-start;gap:16px}.card-body{flex-direction:column;text-align:center}.kg{grid-template-columns:repeat(2,1fr)}.bot-top,.bot-r2{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top">
  <div class="top-l">
    <div class="top-dot"></div>
    <div class="top-t">BTC<span>方向预测</span></div>
  </div>
  <div class="top-m">
    <div class="top-pr" id="price">---</div>
    <div class="top-ch" id="change24">---</div>
  </div>
  <div class="top-r">
    <div class="top-st"><div class="tv" id="h24">---</div><div class="tl">24H 高</div></div>
    <div class="top-st"><div class="tv" id="l24">---</div><div class="tl">24H 低</div></div>
    <div class="top-st"><div class="tv" id="v24">---</div><div class="tl">成交量</div></div>
    <div class="top-st"><div class="tv" id="ts">---</div><div class="tl">更新</div></div>
  </div>
</div>

<!-- Status strip -->
<div class="strip">
  <div class="strip-dot live" id="sDot"></div>
  <span id="sText">连接中...</span>
  <span style="margin-left:16px" id="pmInfo"></span>
</div>

<!-- Main content -->
<div class="main" id="content" style="display:none">

  <!-- Prediction Cards -->
  <div class="cards">
    <div class="card" id="card5">
      <div class="card-hd"><div class="card-tf">5 分钟预测</div><div class="card-vol" id="vol5"></div></div>
      <div class="card-body">
        <div class="card-arrow" id="a5">◆</div>
        <div class="card-info">
          <div class="card-label" id="l5">--</div>
          <div class="card-score">评分 <b id="sc5">0</b></div>
        </div>
      </div>
      <div class="card-cf">
        <div class="card-cf-val" id="cf5">--</div>
        <div class="card-cf-bar"><div class="card-cf-fill" id="cfb5" style="width:0%"></div></div>
      </div>
      <div class="kg" id="kg5"></div>
      <div class="factors" id="fx5"></div>
    </div>

    <div class="card" id="card15">
      <div class="card-hd"><div class="card-tf">15 分钟预测</div><div class="card-vol" id="vol15"></div></div>
      <div class="card-body">
        <div class="card-arrow" id="a15">◆</div>
        <div class="card-info">
          <div class="card-label" id="l15">--</div>
          <div class="card-score">评分 <b id="sc15">0</b></div>
        </div>
      </div>
      <div class="card-cf">
        <div class="card-cf-val" id="cf15">--</div>
        <div class="card-cf-bar"><div class="card-cf-fill" id="cfb15" style="width:0%"></div></div>
      </div>
      <div class="kg" id="kg15"></div>
      <div class="factors" id="fx15"></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="chart-box"><div class="chart-hd">15 分钟 K线趋势</div><canvas id="cTrend" class="chart-cv"></canvas></div>
    <div class="chart-box"><div class="chart-hd">实时价格曲线</div><canvas id="cLive" class="chart-cv"></canvas></div>
  </div>

  <!-- Bottom: Overview + History merged -->
  <div class="bot">
    <div class="bot-top" id="overview"></div>
    <div class="bot-div"></div>
    <div class="bot-hd">
      <span class="bot-title">预测历史</span>
      <span class="bot-acc" id="accSum"></span>
    </div>
    <div class="bot-grid" id="histGrid"></div>
  </div>

</div>

<div class="load" id="loading"><div class="load-ring"></div><div class="load-msg">数据加载中</div></div>
<div class="ft">BTC/USDT <span>Terminal</span> · 7 因子自适应模型 · ATR 归一化 · VWAP 基准</div>

<script>
var cT=null,cL=null,lastDir={5:'',15:''},prevScores={5:{},15:{}};

function icon(d){return d=='up'?'▲▲':d=='leaning_up'?'▲':d=='down'?'▼▼':d=='leaning_down'?'▼':'◆'}
function txt(d){return d=='up'?'强烈看涨':d=='leaning_up'?'偏多':d=='down'?'强烈看跌':d=='leaning_down'?'偏空':'震荡'}
function cls(d){return d=='up'||d=='leaning_up'?'up':d=='down'||d=='leaning_down'?'down':''}

function update(d){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';

  // Top bar
  var pr=d.price||0;
  document.getElementById('price').textContent='$'+pr.toLocaleString(undefined,{minimumFractionDigits:2});
  var chg=d.change24||0,chEl=document.getElementById('change24');
  chEl.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
  chEl.className='top-ch '+(chg>=0?'up':'down');
  document.getElementById('h24').textContent='$'+(Math.round(d.high24||0)).toLocaleString();
  document.getElementById('l24').textContent='$'+(Math.round(d.low24||0)).toLocaleString();
  document.getElementById('v24').textContent=(Math.round(d.vol24||0)).toLocaleString();
  document.getElementById('ts').textContent=(d.ts||'').replace(' UTC','').slice(-8);

  // Status strip
  var age=d.age_ms||0;
  document.getElementById('sDot').className='strip-dot '+(age<500?'live':age<2000?'warn':'dead');
  document.getElementById('sText').textContent=age<500?'延迟 '+age+'ms':age<2000?'延迟 '+(age/1000).toFixed(1)+'s':'重连中...';

  // Prediction market
  var pm=d.pred_market||{};
  document.getElementById('pmInfo').textContent=pm.available&&pm.consensus_direction!=='neutral'
    ?'| 预测市场: '+(pm.consensus_direction==='bullish'?'看涨':'看跌')+' '+(pm.bullish_probability*100).toFixed(0)+'%':'';
  document.getElementById('pmInfo').style.color=pm.consensus_direction==='bullish'?'var(--g)':'var(--r)';

  // Prediction cards
  [['5m',d.pred_5m,'5'],['15m',d.pred_15m,'15']].forEach(function(v){
    var id=v[2],p=v[1];if(!p)return;
    var dir=p.direction,dirCls=cls(dir);

    // Card flash
    var card=document.getElementById('card'+id);
    if(lastDir[id]!==dir){card.classList.remove('flash');void card.offsetWidth;card.classList.add('flash');lastDir[id]=dir;}
    card.className='card '+dir;

    // Vol badge
    var vb=document.getElementById('vol'+id);
    if(p.volatility==='high'){vb.textContent='高波动';vb.className='card-vol high';}
    else if(p.volatility==='low'){vb.textContent='低波动';vb.className='card-vol low';}
    else{vb.textContent='';vb.className='card-vol';}

    // Arrow + label
    document.getElementById('a'+id).textContent=icon(dir);
    document.getElementById('a'+id).className='card-arrow '+dir;
    document.getElementById('l'+id).textContent=txt(dir);
    document.getElementById('l'+id).className='card-label '+dir;

    // Score
    var sc=p.total_score||0;
    document.getElementById('sc'+id).textContent=(sc>0?'+':'')+sc;

    // Confidence
    var cf=p.confidence||0,cfEl=document.getElementById('cf'+id);
    cfEl.textContent=cf+'%';
    cfEl.className='card-cf-val '+dir;
    var cfb=document.getElementById('cfb'+id);
    cfb.style.width=cf+'%';
    cfb.className='card-cf-fill '+dir;

    // Kline grid
    var cp=p.change_pct||0;
    document.getElementById('kg'+id).innerHTML=
      '<div class="kg-i"><div class="kl">开盘</div><div class="kv">$'+(p.open_price||0).toLocaleString()+'</div></div>'+
      '<div class="kg-i"><div class="kl">当前</div><div class="kv" style="color:'+(cp>=0?'var(--g)':'var(--r)')+'">$'+(p.price||0).toLocaleString()+'</div></div>'+
      '<div class="kg-i"><div class="kl">涨跌幅</div><div class="kv" style="color:'+(cp>=0?'var(--g)':'var(--r)')+'">'+(cp>=0?'+':'')+cp.toFixed(4)+'%</div></div>'+
      '<div class="kg-i"><div class="kl">进度</div><div class="kv" style="color:var(--b)">'+(p.candle_pct||0)+'%</div></div>';

    // Factor bars
    var fh='';
    if(p.factors){p.factors.forEach(function(f,i){
      var fs=f.score||0,fCls=fs>0?'up':(fs<0?'down':'');
      var pct=Math.min(Math.abs(fs)/15*100,100);
      var bounce=prevScores[id][i]!==fs?' bounce':'';
      prevScores[id][i]=fs;
      fh+='<div class="factor">'+
        '<div class="factor-name">'+f.name+'</div>'+
        '<div class="factor-detail">'+f.detail+'</div>'+
        '<div class="factor-bar-wrap"><div class="factor-bar '+fCls+'" style="width:'+pct+'%"></div></div>'+
        '<div class="factor-val '+fCls+bounce+'">'+(fs>0?'+':'')+fs+'</div>'+
        '</div>';
    });}
    document.getElementById('fx'+id).innerHTML=fh;
  });

  // Charts
  if(typeof Chart!=='undefined'){drawTrend(d.chart||[]);drawLive(d.chart||[]);}

  // Overview
  var p5=d.pred_5m||{},p15=d.pred_15m||{};
  document.getElementById('overview').innerHTML=
    '<div class="bot-i"><div class="bv">'+icon(p5.direction||'neutral')+' '+txt(p5.direction||'neutral')+'</div><div class="bl">5M 预测</div></div>'+
    '<div class="bot-i"><div class="bv">'+icon(p15.direction||'neutral')+' '+txt(p15.direction||'neutral')+'</div><div class="bl">15M 预测</div></div>'+
    '<div class="bot-i"><div class="bv">$'+Math.round(d.high24||0).toLocaleString()+'</div><div class="bl">24H 最高</div></div>'+
    '<div class="bot-i"><div class="bv">$'+Math.round(d.low24||0).toLocaleString()+'</div><div class="bl">24H 最低</div></div>'+
    '<div class="bot-r2">'+
    '<div class="bot-i"><div class="bv">'+Math.round(d.vol24||0).toLocaleString()+'</div><div class="bl">成交量 BTC</div></div>'+
    '<div class="bot-i"><div class="bv" style="color:'+(chg>=0?'var(--g)':'var(--r)')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</div><div class="bl">24H 涨跌幅</div></div>'+
    '<div class="bot-i"><div class="bv">'+(p5.total_score>0?'+':'')+(p5.total_score||0)+'</div><div class="bl">5M 评分</div></div>'+
    '<div class="bot-i"><div class="bv">'+(p15.total_score>0?'+':'')+(p15.total_score||0)+'</div><div class="bl">15M 评分</div></div>'+
    '</div>';
}

// Charts
function drawTrend(data){
  var ctx=document.getElementById('cTrend');
  if(!data||!data.length){emptyChart(ctx,cT);return;}
  try{
    var xl=data.map(function(c){var d=new Date(c.t);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);});
    var yl=data.map(function(c){return c.c;});
    if(cT)cT.destroy();
    cT=new Chart(ctx,{type:'line',data:{labels:xl,datasets:[{data:yl,borderColor:'#f0b90b',borderWidth:1.5,pointRadius:0,fill:true,backgroundColor:'rgba(240,185,11,0.03)',tension:0.1}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#3d414a',font:{size:8},maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.02)'}},
                y:{position:'right',ticks:{color:'#3d414a',font:{size:8},callback:function(v){return'$'+v.toLocaleString()}},grid:{color:'rgba(255,255,255,0.02)'}}}}});
  }catch(e){}
}
function drawLive(data){
  var ctx=document.getElementById('cLive');
  if(!data||!data.length){emptyChart(ctx,cL);return;}
  try{
    var d2=data.slice(-24);
    var xl=d2.map(function(c){var d=new Date(c.t);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);});
    var yl=d2.map(function(c){return c.c;});
    if(cL)cL.destroy();
    cL=new Chart(ctx,{type:'line',data:{labels:xl,datasets:[{data:yl,borderColor:'#3b82f6',borderWidth:2,pointRadius:0,fill:true,backgroundColor:'rgba(59,130,246,0.03)',tension:0.3}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:200},plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#3d414a',font:{size:8},maxTicksLimit:6},grid:{color:'rgba(255,255,255,0.02)'}},
                y:{position:'right',ticks:{color:'#3d414a',font:{size:8},callback:function(v){return'$'+v.toLocaleString()}},grid:{color:'rgba(255,255,255,0.02)'}}}}});
  }catch(e){}
}
function emptyChart(ctx,c){
  if(c)c.destroy();
  var w=ctx.width||400,h=ctx.height||270;
  var g=ctx.getContext('2d');g.clearRect(0,0,w,h);
  g.fillStyle='#3d414a';g.font='13px Inter,sans-serif';g.textAlign='center';
  g.fillText('等待数据...',w/2,h/2);
}

// History
function loadHistory(){
  fetch('/api/last-predictions').then(function(r){return r.json();}).then(function(items){
    var grid=document.getElementById('histGrid');
    if(!items||!items.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--t3);padding:24px">暂无预测记录</div>';return;}
    var ev=items.filter(function(p){return p.evaluated;});
    var ok=ev.filter(function(p){return p.correct;}).length;
    var acc=ev.length?Math.round(ok/ev.length*100):null;
    var sum=document.getElementById('accSum');
    if(acc!==null){
      var c2=acc>=70?'var(--g)':acc>=50?'var(--y)':'var(--r)';
      sum.innerHTML='准确率 <b style="color:'+c2+'">'+acc+'%</b> &nbsp;'+ok+'/'+ev.length;
    }else if(!ev.length&&items.length){sum.innerHTML='<span style="color:var(--t3)">等待验证...</span>';}
    else{sum.innerHTML='';}

    var h='';
    items.slice(0,8).forEach(function(p){
      var dir=p.direction||'neutral';
      var ic=icon(dir),col=dir==='up'||dir==='leaning_up'?'var(--g)':dir==='down'||dir==='leaning_down'?'var(--r)':'var(--y)';
      var ts=p.ts||'',time=ts.slice(11,19)||'';
      var sc=p.score||0;
      var res='';
      if(p.evaluated){
        var c=p.correct,cls2=c?'win':'lose';
        res='<div class="bot-result '+cls2+'">'+
          '<div class="bot-mark '+cls2+'">'+(c?'✓':'✗')+'</div>'+
          '<div class="bot-sub '+cls2+'">'+(c?'正确':'错误')+'</div>'+
          '<div class="bot-pct '+cls2+'">'+(p.change_pct>0?'+':'')+(p.change_pct||0).toFixed(2)+'%</div>'+
          '</div>';
      }else{res='<div class="bot-pend">⏳</div>';}
      h+='<div class="bot-card">'+
        '<div class="bot-time">'+time+' · '+p.timeframe+'</div>'+
        '<div class="bot-arrow" style="color:'+col+'">'+ic+'</div>'+
        '<div class="bot-dir">'+txt(dir)+'</div>'+
        '<div class="bot-score">'+(sc>0?'+':'')+sc+'</div>'+
        res+'</div>';
    });
    grid.innerHTML=h;
  }).catch(function(){});
}

// SSE
var es=null,tr=0;
function sse(){
  if(es)es.close();
  es=new EventSource('/api/stream');
  es.onmessage=function(e){try{var d=JSON.parse(e.data);if(d.ok!==false)update(d);tr=0;}catch(err){}}
  es.onerror=function(){tr++;if(tr>5){es.close();setInterval(function(){fetch('/api/analysis').then(function(r){return r.json();}).then(function(d){update(d);}).catch(function(){});},400);}}
  es.onopen=function(){tr=0;}
}

function start(){
  fetch('/api/analysis').then(function(r){return r.json();}).then(function(d){update(d);loadHistory();}).catch(function(){});
  sse();
  setInterval(loadHistory,8000);
}
document.addEventListener('DOMContentLoaded',start);
if(document.readyState==='interactive'||document.readyState==='complete')start();
</script>
</body>
</html>
