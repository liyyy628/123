<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTC Direction Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:#0a0e17;color:#e0e6ed;min-height:100vh}
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--g:#00d4aa;--r:#ff4d6a;--y:#f0b90b;--b:#4da6ff;--o:#ff9800;--br:#1f2937;--t2:#6b7280}

.header{background:var(--bg2);border-bottom:1px solid var(--br);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-size:22px;font-weight:800;color:var(--y);letter-spacing:2px}
.pb{font-size:32px;font-weight:700;letter-spacing:1px}
.cg{font-size:14px;padding:3px 10px;border-radius:4px;font-weight:600}
.cg.up{background:rgba(0,212,170,0.15);color:var(--g)}.cg.down{background:rgba(255,77,106,0.15);color:var(--r)}
.sb{font-size:11px;color:var(--t2)}.sb b{color:#e0e6ed}
.ct{max-width:1200px;margin:0 auto;padding:14px}

.pg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
/* Cards */
.pc{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:18px 16px;text-align:center;transition:all 0.3s}
.pc.up{border-color:rgba(0,212,170,0.4);box-shadow:0 0 24px rgba(0,212,170,0.08)}
.pc.down{border-color:rgba(255,77,106,0.4);box-shadow:0 0 24px rgba(255,77,106,0.08)}
.pc.leaning_up{border-color:rgba(0,212,170,0.2);box-shadow:0 0 16px rgba(0,212,170,0.03)}
.pc.leaning_down{border-color:rgba(255,77,106,0.2);box-shadow:0 0 16px rgba(255,77,106,0.03)}
.pc.neutral{border-color:rgba(240,185,11,0.3)}
.pc.flash{animation:cardFlash 0.6s}
@keyframes cardFlash{0%{transform:scale(1.02)}100%{transform:scale(1)}}

.ph{font-size:11px;letter-spacing:2px;color:var(--t2);margin-bottom:6px}
.pa{font-size:52px;line-height:1.1;margin:2px 0;transition:color 0.4s}
.pa.up{color:var(--g)}.pa.down{color:var(--r)}.pa.leaning_up{color:#80e8ce}.pa.leaning_down{color:#ff99aa}.pa.neutral{color:var(--y)}
.pl{font-size:15px;font-weight:700;margin:2px 0 10px}
.pl.up{color:var(--g)}.pl.down{color:var(--r)}.pl.leaning_up{color:#80e8ce}.pl.leaning_down{color:#ff99aa}.pl.neutral{color:var(--y)}
.sc{font-size:13px;font-weight:600;padding:2px 0;margin-bottom:6px}
.sc.up{color:var(--g)}.sc.down{color:var(--r)}.sc.leaning_up{color:#80e8ce}.sc.leaning_down{color:#ff99aa}.sc.neutral{color:var(--y)}

.bw{background:var(--bg3);border-radius:6px;height:6px;margin:6px 0;overflow:hidden}
.bf{height:100%;border-radius:6px;transition:width 0.4s}
.bf.up{background:linear-gradient(90deg,var(--g),#00ffcc)}
.bf.down{background:linear-gradient(90deg,var(--r),#ff8099)}
.bf.leaning_up{background:linear-gradient(90deg,#80e8ce,#00d4aa)}
.bf.leaning_down{background:linear-gradient(90deg,#ff99aa,#ff4d6a)}
.bf.neutral{background:linear-gradient(90deg,var(--y),#ffe066)}
.bv{font-size:24px;font-weight:800}
.ci{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px}
.ci div{background:var(--bg3);padding:6px;border-radius:4px;text-align:center}
.cl{color:var(--t2);font-size:10px}.cv{font-weight:700;font-size:14px}
.pb2{border-radius:4px;height:3px;margin-top:6px;background:var(--bg3);overflow:hidden}
.pf2{height:100%;background:var(--b);border-radius:4px;transition:width 1s linear}
.pt{font-size:10px;color:var(--t2);margin-top:2px;text-align:right}
.fl{margin-top:8px;text-align:left}
.fr{display:flex;justify-content:space-between;align-items:center;padding:3px 6px;font-size:11px;border-radius:3px;margin:1px 0}
.fr.pos{background:rgba(0,212,170,0.04)}.fr.neg{background:rgba(255,77,106,0.04)}
.fs{font-weight:700;font-size:13px}.fs.pos{color:var(--g)}.fs.neg{color:var(--r)}

/* Charts row */
.cr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cd{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:14px}
.ct2{font-size:11px;letter-spacing:2px;color:var(--t2);margin-bottom:10px}
.ch{width:100%!important;height:240px!important}

/* Market overview row */
.or{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.oi{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:14px;text-align:center}
.ov{font-size:20px;font-weight:700}
.ol{font-size:10px;color:var(--t2);margin-top:4px;letter-spacing:1px}
.od{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

.ft{text-align:center;padding:10px;color:var(--t2);font-size:10px;border-top:1px solid var(--br);margin-top:14px}
.ld{width:6px;height:6px;display:inline-block;background:var(--g);border-radius:50%;animation:pk 2s infinite;margin-right:6px}
@keyframes pk{0%,100%{opacity:1}50%{opacity:0.2}}
.err{background:var(--bg2);border:1px solid var(--r);padding:20px;text-align:center;border-radius:12px;margin:20px}
.loading{padding:40px;text-align:center;color:var(--t2);font-size:14px}
.loading span{animation:pk 1.5s infinite;font-size:20px}
.lat{font-size:10px;color:var(--t2);text-align:right;padding:2px 14px}
.lat.good{color:var(--g)}.lat.warn{color:var(--y)}.lat.bad{color:var(--r)}
@media(max-width:768px){.pg,.cr,.or,.od{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">BTC<span style="color:var(--t2);font-weight:400;font-size:12px;margin-left:6px">方向预测</span></div>
  <div><div class="pb" id="price">---</div><div class="cg" id="change24"></div></div>
  <div class="sb">24H高 <b id="h24">---</b>&nbsp;&nbsp;|&nbsp;&nbsp;24H低 <b id="l24">---</b>&nbsp;&nbsp;|&nbsp;&nbsp;量 <b id="v24">---</b>&nbsp;&nbsp;|&nbsp;&nbsp;<span class="ld"></span><b id="ts">---</b></div>
</div>
<div class="lat" id="latency"></div>

<div class="ct" id="content" style="display:none">
  <!-- Prediction Cards -->
  <div class="pg">
    <div class="pc" id="card5m">
      <div class="ph">5分钟预测</div>
      <div class="pa" id="a5">--</div>
      <div class="pl" id="l5">--</div>
      <div class="sc" id="sc5"></div>
      <div class="bv" id="conf5">--</div>
      <div class="bw"><div class="bf" id="bf5" style="width:0%"></div></div>
      <div class="pb2"><div class="pf2" id="pf5" style="width:0%"></div></div>
      <div class="pt" id="pt5">--</div>
      <div class="ci" id="ci5"></div>
      <div class="fl" id="fl5"></div>
    </div>
    <div class="pc" id="card15m">
      <div class="ph">15分钟预测</div>
      <div class="pa" id="a15">--</div>
      <div class="pl" id="l15">--</div>
      <div class="sc" id="sc15"></div>
      <div class="bv" id="conf15">--</div>
      <div class="bw"><div class="bf" id="bf15" style="width:0%"></div></div>
      <div class="pb2"><div class="pf2" id="pf15" style="width:0%"></div></div>
      <div class="pt" id="pt15">--</div>
      <div class="ci" id="ci15"></div>
      <div class="fl" id="fl15"></div>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="cr">
    <div class="cd"><div class="ct2">15分钟K线趋势</div><canvas id="chartTrend" class="ch"></canvas></div>
    <div class="cd"><div class="ct2">实时价格曲线</div><canvas id="chartLive" class="ch"></canvas></div>
  </div>

  <!-- Market Overview -->
  <div class="or" id="overview">
    <div class="oi"><div class="ov" id="ov5m">--</div><div class="ol">5M预测</div></div>
    <div class="oi"><div class="ov" id="ov15m">--</div><div class="ol">15M预测</div></div>
    <div class="oi"><div class="ov" id="ovH">--</div><div class="ol">24H最高</div></div>
    <div class="oi"><div class="ov" id="ovL">--</div><div class="ol">24H最低</div></div>
    <div class="od">
      <div class="oi"><div class="ov" id="ovVol">--</div><div class="ol">24H成交量(BTC)</div></div>
      <div class="oi"><div class="ov" id="ovChg">--</div><div class="ol">24H涨跌幅</div></div>
      <div class="oi"><div class="ov" id="ovScore5">--</div><div class="ol">5M评分</div></div>
      <div class="oi"><div class="ov" id="ovScore15">--</div><div class="ol">15M评分</div></div>
    </div>
  </div>
</div>

<div class="err" id="error" style="display:none"><div style="font-size:18px;margin-bottom:8px">连接中...</div><div style="color:var(--t2);font-size:13px" id="errMsg"></div></div>
<div class="loading" id="loading"><span>●</span> 加载中...</div>
<div class="ft">BTC/USDT 实时方向预测 · 7因子评分 · WebSocket · <span id="rh"></span></div>

<script>
var chartTrend = null, chartLive = null;
var tried = 0;
var lastDir = {5:'neutral',15:'neutral'};
var livePrices = []; // Rolling real-time prices

function icon(d){
  if(d=='up') return '↑↑'; if(d=='leaning_up') return '↑';
  if(d=='down') return '↓↓'; if(d=='leaning_down') return '↓';
  return '↔';
}
function txt(d){
  if(d=='up') return '强烈看涨'; if(d=='leaning_up') return '偏多';
  if(d=='down') return '强烈看跌'; if(d=='leaning_down') return '偏空';
  return '震荡';
}

function update(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('error').style.display = 'none';

  // Header
  document.getElementById('price').textContent = '$' + (d.price||0).toLocaleString();
  var c = document.getElementById('change24');
  var chg = d.change24||0;
  c.textContent = (chg>=0?'+':'') + chg + '%';
  c.className = 'cg ' + (chg>=0?'up':'down');
  document.getElementById('h24').textContent = '$' + Math.round(d.high24||0).toLocaleString();
  document.getElementById('l24').textContent = '$' + Math.round(d.low24||0).toLocaleString();
  document.getElementById('v24').textContent = Math.round(d.vol24||0).toLocaleString() + ' BTC';
  document.getElementById('ts').textContent = (d.ts||'').replace(' UTC','');
  document.getElementById('rh').textContent = '更新: ' + new Date().toLocaleTimeString();

  // Latency indicator
  var lat = document.getElementById('latency');
  var age = d.ws_age_ms||0;
  if(age < 500) { lat.textContent = '数据延迟: ' + age + 'ms | ' + (d.ws_connected?'WebSocket':'REST'); lat.className = 'lat good'; }
  else if(age < 2000) { lat.textContent = '数据延迟: ' + (age/1000).toFixed(1) + 's | ' + (d.ws_connected?'WebSocket':'REST'); lat.className = 'lat warn'; }
  else { lat.textContent = '数据延迟: ' + (age/1000).toFixed(1) + 's | 重连中...'; lat.className = 'lat bad'; }

  // Prediction cards
  [['5m',d.pred_5m,'5'],['15m',d.pred_15m,'15']].forEach(function(v){
    var id = v[2]; var p = v[1]; if(!p) return;
    var dir = p.direction;
    var card = document.getElementById('card'+id+'m');
    if(lastDir[id] !== dir) {
      card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');
      lastDir[id] = dir;
    }
    card.className = 'pc ' + dir;
    document.getElementById('a'+id).textContent = icon(dir);
    document.getElementById('a'+id).className = 'pa ' + dir;
    document.getElementById('l'+id).textContent = txt(dir);
    document.getElementById('l'+id).className = 'pl ' + dir;
    var volLabel = p.volatility == 'high' ? '高波' : (p.volatility == 'low' ? '低波' : '');
    var volColor = p.volatility == 'high' ? 'var(--r)' : (p.volatility == 'low' ? 'var(--t2)' : '');
    var volStr = volLabel ? ' <span style=\"font-size:10px;color:'+volColor+'\">['+volLabel+']</span>' : '';
    document.getElementById('sc'+id).innerHTML = '评分: ' + (p.total_score>0?'+':'') + p.total_score + volStr;
    document.getElementById('sc'+id).className = 'sc ' + dir;
    document.getElementById('conf'+id).textContent = p.confidence + '% 置信度';
    document.getElementById('bf'+id).style.width = p.confidence + '%';
    document.getElementById('bf'+id).className = 'bf ' + dir;
    document.getElementById('pf'+id).style.width = p.candle_pct + '%';
    document.getElementById('pt'+id).textContent = 'K线进度 ' + p.candle_pct + '%';
    document.getElementById('ci'+id).innerHTML =
      '<div><div class="cl">开盘</div><div class="cv">$' + (p.open_price||0).toLocaleString() + '</div></div>'+
      '<div><div class="cl">当前</div><div class="cv" style="color:'+(p.change_pct>=0?'var(--g)':'var(--r)')+'">$' + (p.price||0).toLocaleString() + '</div></div>'+
      '<div><div class="cl">涨跌</div><div class="cv" style="color:'+(p.change_pct>=0?'var(--g)':'var(--r)')+'">'+(p.change_pct>=0?'+':'')+(p.change_pct||0).toFixed(4)+'%</div></div>'+
      '<div><div class="cl">状态</div><div class="cv" style="color:'+(p.change_pct>=0?'var(--g)':'var(--r)')+'">'+p.candle_status+'</div></div>';
    var fh = '';
    p.factors.forEach(function(f){
      var cl = f.score>0?'pos':(f.score<0?'neg':'');
      fh += '<div class="fr '+cl+'"><span>'+f.name+' <span style="color:var(--t2);font-size:10px">'+f.detail+'</span></span><span class="fs '+cl+'">'+(f.score>0?'+':'')+f.score+'</span></div>';
    });
    document.getElementById('fl'+id).innerHTML = fh;
  });

  // Charts
  if(typeof Chart !== 'undefined') {
    updateTrendChart(d.chart||[]);
    updateLiveChart(d.chart||[]);
  }

  // Market overview
  var p5 = d.pred_5m||{}, p15 = d.pred_15m||{};
  document.getElementById('ov5m').textContent = icon(p5.direction||'neutral') + ' ' + txt(p5.direction||'neutral');
  document.getElementById('ov15m').textContent = icon(p15.direction||'neutral') + ' ' + txt(p15.direction||'neutral');
  document.getElementById('ovH').textContent = '$' + Math.round(d.high24||0).toLocaleString();
  document.getElementById('ovL').textContent = '$' + Math.round(d.low24||0).toLocaleString();
  document.getElementById('ovVol').textContent = Math.round(d.vol24||0).toLocaleString();
  document.getElementById('ovChg').textContent = (chg>=0?'+':'') + chg + '%';
  document.getElementById('ovScore5').textContent = (p5.total_score>0?'+':'') + (p5.total_score||0);
  document.getElementById('ovScore15').textContent = (p15.total_score>0?'+':'') + (p15.total_score||0);
}

// 15-minute trend chart (40 candles)
function updateTrendChart(data) {
  var ctx = document.getElementById('chartTrend');
  if(!data||!data.length) {
    // Show placeholder text on empty canvas
    if(chartTrend) chartTrend.destroy();
    var c2d = ctx.getContext('2d');
    c2d.clearRect(0,0,ctx.width,ctx.height);
    c2d.fillStyle='#6b7280'; c2d.font='14px sans-serif';
    c2d.textAlign='center';
    c2d.fillText('等待数据...',ctx.width/2,ctx.height/2);
    return;
  }
  try {
    var xl = data.map(function(c){var d=new Date(c.t);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');});
    var yl = data.map(function(c){return c.c;});
    var ctx = document.getElementById('chartTrend');
    if(chartTrend) chartTrend.destroy();
    chartTrend = new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{labels:xl,datasets:[{data:yl,borderColor:'#f0b90b',backgroundColor:'rgba(240,185,11,0.06)',borderWidth:1.5,pointRadius:0,fill:true,tension:0.1}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#4a5568',font:{size:9},maxTicksLimit:8},grid:{color:'rgba(31,41,55,0.3)'}},
                y:{position:'right',ticks:{color:'#4a5568',font:{size:9},callback:function(v){return '$'+v.toLocaleString();}},grid:{color:'rgba(31,41,55,0.3)'}}}}
    });
  } catch(e){console.error('Trend chart:',e);}
}

// Real-time live curve (last 20 candles)
function updateLiveChart(data) {
  var ctx = document.getElementById('chartLive');
  if(!data||!data.length) {
    if(chartLive) chartLive.destroy();
    var c2d = ctx.getContext('2d');
    c2d.clearRect(0,0,ctx.width,ctx.height);
    c2d.fillStyle='#6b7280'; c2d.font='14px sans-serif';
    c2d.textAlign='center';
    c2d.fillText('等待数据...',ctx.width/2,ctx.height/2);
    return;
  }
  try {
    var recent = data.slice(-20);
    var xl = recent.map(function(c){var d=new Date(c.t);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');});
    var yl = recent.map(function(c){return c.c;});
    var ctx = document.getElementById('chartLive');
    if(chartLive) chartLive.destroy();
    chartLive = new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{labels:xl,datasets:[{data:yl,borderColor:'#4da6ff',backgroundColor:'rgba(77,166,255,0.06)',borderWidth:2,pointRadius:1,pointBackgroundColor:'#4da6ff',fill:true,tension:0.3}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:200},plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#4a5568',font:{size:9},maxTicksLimit:6},grid:{color:'rgba(31,41,55,0.3)'}},
                y:{position:'right',ticks:{color:'#4a5568',font:{size:9},callback:function(v){return '$'+v.toLocaleString();}},grid:{color:'rgba(31,41,55,0.3)'}}}}
    });
  } catch(e){console.error('Live chart:',e);}
}

// ---- SSE ----
var es = null;
function connectSSE() {
  if(es) es.close();
  es = new EventSource('/api/stream');
  es.onmessage = function(e){
    try{ var d=JSON.parse(e.data); if(d.ok){update(d);tried=0;} }catch(err){}
  };
  es.onerror = function(){
    tried++;
    if(tried>5){es.close(); setInterval(function(){fetch('/api/analysis').then(function(r){return r.json();}).then(function(d){if(d.ok)update(d);}).catch(function(){});},500);}
  };
  es.onopen = function(){tried=0;document.getElementById('loading').style.display='none';};
}

function showErr(msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='none';
  document.getElementById('error').style.display='block';
  document.getElementById('errMsg').textContent=msg;
}

function start(){
  fetch('/api/analysis').then(function(r){return r.json();}).then(function(d){if(d.ok)update(d);}).catch(function(){});
  connectSSE();
}
document.addEventListener('DOMContentLoaded',start);
if(document.readyState==='interactive'||document.readyState==='complete')start();
</script>
</body>
</html>
