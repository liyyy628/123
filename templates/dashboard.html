<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTC Direction Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"SF Mono","Consolas","Menlo",monospace;background:#0a0e17;color:#e0e6ed;min-height:100vh}
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--green:#00d4aa;--red:#ff4d6a;--yellow:#f0b90b;--blue:#4da6ff;--border:#1f2937;--text2:#6b7280}

.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
}
.logo{font-size:20px;font-weight:800;color:var(--yellow);letter-spacing:2px}
.logo span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}
.price-big{font-size:28px;font-weight:700;letter-spacing:1px}
.chg{font-size:13px;padding:2px 8px;border-radius:4px;font-weight:600}
.chg.up{background:rgba(0,212,170,0.15);color:var(--green)}
.chg.down{background:rgba(255,77,106,0.15);color:var(--red)}
.stats{display:flex;gap:18px;font-size:12px;color:var(--text2)}
.stats b{color:var(--text)}

.container{max-width:1200px;margin:0 auto;padding:16px;}

/* Prediction cards */
.pred-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.pred-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:20px;text-align:center;transition:border 0.3s;
}
.pred-card:hover{border-color:var(--blue)}
.pred-card.up{border-color:rgba(0,212,170,0.4);box-shadow:0 0 20px rgba(0,212,170,0.06)}
.pred-card.down{border-color:rgba(255,77,106,0.4);box-shadow:0 0 20px rgba(255,77,106,0.06)}
.pred-card.neutral{border-color:rgba(240,185,11,0.3)}

.pred-header{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text2);margin-bottom:8px}
.pred-arrow{font-size:48px;line-height:1;margin:4px 0}
.pred-arrow.up{color:var(--green)}
.pred-arrow.down{color:var(--red)}
.pred-arrow.neutral{color:var(--yellow)}
.pred-label{font-size:14px;font-weight:700;margin:4px 0 12px}
.pred-label.up{color:var(--green)}.pred-label.down{color:var(--red)}.pred-label.neutral{color:var(--yellow)}

/* Confidence bar */
.conf-bar-wrap{background:var(--bg3);border-radius:6px;height:6px;margin:8px 0;overflow:hidden}
.conf-bar{height:100%;border-radius:6px;transition:width 0.5s}
.conf-bar.up{background:linear-gradient(90deg,var(--green),#00ffcc)}
.conf-bar.down{background:linear-gradient(90deg,var(--red),#ff8099)}
.conf-bar.neutral{background:linear-gradient(90deg,var(--yellow),#ffe066)}
.conf-text{font-size:22px;font-weight:800}

/* Candle info */
.candle-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;font-size:12px}
.candle-info div{background:var(--bg3);padding:6px;border-radius:4px;text-align:center}
.ci-label{color:var(--text2);font-size:10px}.ci-val{font-weight:700;font-size:15px}

/* Progress bar */
.progress{border-radius:4px;height:4px;margin-top:8px;background:var(--bg3);overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:4px;transition:width 1s linear}
.progress-text{font-size:10px;color:var(--text2);margin-top:2px;text-align:right}

/* Factors */
.factor-list{margin-top:10px;text-align:left}
.factor-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:11px;border-radius:3px;margin:2px 0}
.factor-row.pos{background:rgba(0,212,170,0.05)}.factor-row.neg{background:rgba(255,77,106,0.05)}
.factor-score{font-weight:700;font-size:13px}.factor-score.pos{color:var(--green)}.factor-score.neg{color:var(--red)}

/* Bottom row */
.bottom-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;
}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text2);margin-bottom:10px}
canvas{width:100%!important;height:280px!important}

/* Summary row */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.summary-item{text-align:center;background:var(--bg3);padding:10px 6px;border-radius:6px}
.summary-val{font-size:18px;font-weight:700}.summary-label{font-size:10px;color:var(--text2);margin-top:2px}

.footer{text-align:center;padding:10px;color:var(--text2);font-size:10px;border-top:1px solid var(--border);margin-top:16px}
.live-dot{width:6px;height:6px;display:inline-block;background:var(--green);border-radius:50%;animation:pulse 2s infinite;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.flash{animation:flash 0.5s}
@keyframes flash{0%{opacity:0.5}100%{opacity:1}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">BTC<span>方向预测</span></div>
  <div>
    <div class="price-big" id="price">---</div>
    <div class="chg" id="change24"></div>
  </div>
  <div class="stats">
    <div>24H高 <b id="h24">---</b></div>
    <div>24H低 <b id="l24">---</b></div>
    <div>量 <b id="v24">---</b></div>
    <div><span class="live-dot"></span><b id="ts">---</b></div>
  </div>
</div>

<div class="container">
  <!-- Prediction Cards -->
  <div class="pred-grid">
    <div class="pred-card" id="card5">
      <div class="pred-header">5分钟方向预测</div>
      <div class="pred-arrow" id="arrow5">--</div>
      <div class="pred-label" id="label5">--</div>
      <div class="conf-text" id="conf5">--</div>
      <div class="conf-bar-wrap"><div class="conf-bar" id="bar5" style="width:0%"></div></div>
      <div class="progress"><div class="progress-fill" id="prog5" style="width:0%"></div></div>
      <div class="progress-text" id="progText5">--</div>
      <div class="candle-info" id="candle5"></div>
      <div class="factor-list" id="factors5"></div>
    </div>

    <div class="pred-card" id="card15">
      <div class="pred-header">15分钟方向预测</div>
      <div class="pred-arrow" id="arrow15">--</div>
      <div class="pred-label" id="label15">--</div>
      <div class="conf-text" id="conf15">--</div>
      <div class="conf-bar-wrap"><div class="conf-bar" id="bar15" style="width:0%"></div></div>
      <div class="progress"><div class="progress-fill" id="prog15" style="width:0%"></div></div>
      <div class="progress-text" id="progText15">--</div>
      <div class="candle-info" id="candle15"></div>
      <div class="factor-list" id="factors15"></div>
    </div>
  </div>

  <!-- Bottom: Chart + Summary -->
  <div class="bottom-grid">
    <div class="card">
      <div class="card-title">15分钟走势图</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="card">
      <div class="card-title">盘口概览</div>
      <div class="summary" id="summary"></div>
    </div>
  </div>
</div>

<div class="footer">
  BTC/USDT 方向预测系统 · 5因子评分模型 · <span id="refreshHint">每15秒刷新</span>
</div>

<script>
let chart;
function icon(dir){ return dir=='up'?'\u2191':(dir=='down'?'\u2193':'\u2194'); }
function label(dir){ return dir=='up'?'看涨':(dir=='down'?'看跌':'震荡'); }

function update(d) {
  // Header
  document.getElementById('price').textContent = '$' + d.price.toLocaleString();
  const c = document.getElementById('change24');
  c.textContent = (d.change24>=0?'+':'') + d.change24 + '%';
  c.className = 'chg ' + (d.change24>=0?'up':'down');
  document.getElementById('h24').textContent = '$' + Math.round(d.high24).toLocaleString();
  document.getElementById('l24').textContent = '$' + Math.round(d.low24).toLocaleString();
  document.getElementById('v24').textContent = Math.round(d.vol24).toLocaleString() + ' BTC';
  document.getElementById('ts').textContent = d.ts || '---';

  // Predictions
  [['5m', d.pred_5m], ['15m', d.pred_15m]].forEach(([tf, p]) => {
    if (!p) return;
    const dir = p.direction;
    document.getElementById('card'+tf).className = 'pred-card ' + dir;
    document.getElementById('arrow'+tf).textContent = icon(dir);
    document.getElementById('arrow'+tf).className = 'pred-arrow ' + dir;
    document.getElementById('label'+tf).textContent = label(dir);
    document.getElementById('label'+tf).className = 'pred-label ' + dir;
    document.getElementById('conf'+tf).textContent = p.confidence + '% 置信度';
    document.getElementById('bar'+tf).style.width = p.confidence + '%';
    document.getElementById('bar'+tf).className = 'conf-bar ' + dir;
    document.getElementById('prog'+tf).style.width = p.candle_pct + '%';
    document.getElementById('progText'+tf).textContent = 'K线进度 ' + p.candle_pct + '%';

    // Candle info
    document.getElementById('candle'+tf).innerHTML =
      '<div><div class="ci-label">开盘</div><div class="ci-val">$' + p.open_price.toLocaleString() + '</div></div>'+
      '<div><div class="ci-label">当前</div><div class="ci-val" style="color:'+(p.change_pct>=0?'var(--green)':'var(--red)')+'">$' + p.price.toLocaleString() + '</div></div>'+
      '<div><div class="ci-label">涨跌幅</div><div class="ci-val" style="color:'+(p.change_pct>=0?'var(--green)':'var(--red)')+'">'+(p.change_pct>=0?'+':'')+p.change_pct.toFixed(4)+'%</div></div>'+
      '<div><div class="ci-label">K线状态</div><div class="ci-val" style="color:'+(p.change_pct>=0?'var(--green)':'var(--red)')+'">'+p.candle_status+'</div></div>';

    // Factors
    let fHTML = '';
    p.factors.forEach(f => {
      const cls = f.score > 0 ? 'pos' : (f.score < 0 ? 'neg' : '');
      fHTML += '<div class="factor-row ' + cls + '"><span>' + f.name + ' <span style="color:var(--text2);font-size:10px">' + f.detail + '</span></span><span class="factor-score ' + cls + '">' + (f.score>0?'+':'') + f.score + '</span></div>';
    });
    document.getElementById('factors'+tf).innerHTML = fHTML;
  });

  // Chart
  updateChart(d.chart || []);

  // Summary
  document.getElementById('summary').innerHTML =
    '<div class="summary-item"><div class="summary-val" id="s5dir">'+icon(d.pred_5m.direction)+' '+label(d.pred_5m.direction)+'</div><div class="summary-label">5M预测</div></div>'+
    '<div class="summary-item"><div class="summary-val" id="s15dir">'+icon(d.pred_15m.direction)+' '+label(d.pred_15m.direction)+'</div><div class="summary-label">15M预测</div></div>'+
    '<div class="summary-item"><div class="summary-val">$'+Math.round(d.high24).toLocaleString()+'</div><div class="summary-label">24H高</div></div>'+
    '<div class="summary-item"><div class="summary-val">$'+Math.round(d.low24).toLocaleString()+'</div><div class="summary-label">24H低</div></div>';
}

function updateChart(data) {
  const labels = data.map(c => new Date(c.t).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
  const closes = data.map(c => c.c);
  const opens = data.map(c => c.o);

  if (chart) chart.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'BTC',
        data: closes,
        borderColor: '#f0b90b',
        backgroundColor: 'rgba(240,185,11,0.06)',
        borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.1,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#4a5568', font: { size: 9 }, maxTicksLimit: 8 }, grid: { color: 'rgba(31,41,55,0.3)' } },
        y: { position: 'right', ticks: { color: '#4a5568', font: { size: 9 }, callback: v => '$' + v.toLocaleString() }, grid: { color: 'rgba(31,41,55,0.3)' } }
      }
    }
  });
}

async function load() {
  try {
    const r = await fetch('/api/analysis');
    if (r.ok) { const d = await r.json(); if (d.ok) update(d); }
  } catch(e) { console.error(e); }
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
