<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Trading Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   BTC Trading Assistant — Premium Dark Dashboard
   Design System: Glassmorphism 2.0 + Neon Luxury + Micro-interactions
   ═══════════════════════════════════════════════════════════════ */

:root {
  /* ── Core palette ── */
  --bg-deep: #020408;
  --bg-primary: #060b14;
  --bg-secondary: #0a101f;
  --bg-card: rgba(12, 18, 34, 0.7);
  --bg-card-solid: #0c1424;
  --bg-elevated: rgba(18, 26, 48, 0.8);
  --bg-glass: rgba(16, 22, 42, 0.55);

  /* ── Accent colors ── */
  --green: #00e6a0;
  --green-bright: #1fffc4;
  --green-dim: rgba(0, 230, 160, 0.12);
  --green-glow: rgba(0, 230, 160, 0.35);
  --green-glow-strong: rgba(0, 230, 160, 0.5);
  --red: #ff4d6a;
  --red-bright: #ff7085;
  --red-dim: rgba(255, 77, 106, 0.12);
  --red-glow: rgba(255, 77, 106, 0.35);
  --gold: #f5b842;
  --gold-bright: #ffd06a;
  --gold-dim: rgba(245, 184, 66, 0.12);
  --gold-glow: rgba(245, 184, 66, 0.35);
  --blue: #4d9fff;
  --blue-bright: #6db5ff;
  --blue-dim: rgba(77, 159, 255, 0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167, 139, 250, 0.1);
  --cyan: #22d3ee;
  --cyan-dim: rgba(34, 211, 238, 0.1);

  /* ── Text ── */
  --text-primary: #eef2f8;
  --text-secondary: #8892a8;
  --text-tertiary: #4a5468;
  --text-muted: #2a3040;

  /* ── Borders ── */
  --border-subtle: rgba(255, 255, 255, 0.05);
  --border-card: rgba(255, 255, 255, 0.07);
  --border-hover: rgba(255, 255, 255, 0.13);
  --border-glow: rgba(255, 255, 255, 0.18);

  /* ── Radii ── */
  --radius-xs: 6px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-xl: 24px;

  /* ── Shadows ── */
  --shadow-xs: 0 2px 8px rgba(0, 0, 0, 0.2);
  --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.35);
  --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.45);
  --shadow-glow-green: 0 0 40px rgba(0, 230, 160, 0.2);
  --shadow-glow-red: 0 0 40px rgba(255, 77, 106, 0.2);
  --shadow-glow-gold: 0 0 40px rgba(245, 184, 66, 0.15);

  /* ── Transitions ── */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-spring: cubic-bezier(0.22, 1.2, 0.36, 1);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 600ms;
  --duration-glacial: 1200ms;
}

*{margin:0;padding:0;box-sizing:border-box}

/* ── Font rendering ── */
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg-deep);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}

/* ═══════════════════════════════════════════════════
   ANIMATED BACKGROUND — Particle Canvas + Grid
   ═══════════════════════════════════════════════════ */

#particleCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;opacity:0.6;
}

/* Subtle radial vignette */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(0,230,160,0.03) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 20%, rgba(245,184,66,0.02) 0%, transparent 50%),
             radial-gradient(ellipse at 20% 80%, rgba(77,159,255,0.02) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}

/* Subtle grid overlay */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events:none;z-index:0;
  mask-image: radial-gradient(ellipse at 50% 0%, black 40%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 40%, transparent 70%);
}

/* ═══════════════════════════════════════════════════
   SCROLLBAR — Premium thin
   ═══════════════════════════════════════════════════ */

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}
::-webkit-scrollbar-corner{background:transparent}

/* ═══════════════════════════════════════════════════
   TOPBAR — Glassmorphism 2.0
   ═══════════════════════════════════════════════════ */

.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(6,11,20,0.78);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-bottom:1px solid var(--border-subtle);
  padding:0 36px;height:76px;display:flex;align-items:center;
  transition:all var(--duration-normal) var(--ease-out-expo);
}
.topbar-inner{
  max-width:1500px;margin:0 auto;width:100%;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-left{display:flex;align-items:center;gap:18px}
.topbar-logo{
  width:42px;height:42px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,#f5b842 0%,#f7931a 40%,#e8880a 100%);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:19px;color:#1a1000;
  box-shadow:0 0 28px rgba(245,184,66,0.35),0 4px 12px rgba(0,0,0,0.3);
  transition:all var(--duration-normal) var(--ease-out-expo);
  animation:logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow{
  0%,100%{box-shadow:0 0 28px rgba(245,184,66,0.35),0 4px 12px rgba(0,0,0,0.3)}
  50%{box-shadow:0 0 44px rgba(245,184,66,0.55),0 4px 16px rgba(0,0,0,0.4)}
}
.topbar-logo:hover{
  transform:scale(1.08) rotate(-5deg);
  box-shadow:0 0 50px rgba(245,184,66,0.6),0 6px 20px rgba(0,0,0,0.4);
}
.topbar-title{
  font-size:19px;font-weight:700;letter-spacing:-0.6px;
  background:linear-gradient(135deg,var(--text-primary) 0%,#c0c8d8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.topbar-title span{
  color:var(--text-tertiary);font-weight:400;font-size:11px;margin-left:8px;
  background:none;-webkit-text-fill-color:var(--text-tertiary);
  padding:2px 8px;border-radius:10px;background:rgba(255,255,255,0.04);
  letter-spacing:1px;
}
.topbar-center{text-align:center}
.topbar-price-wrap{
  display:flex;align-items:baseline;gap:8px;justify-content:center;
}
.topbar-price{
  font-size:40px;font-weight:800;letter-spacing:-2px;
  font-variant-numeric:tabular-nums;line-height:1;
  font-family:'JetBrains Mono','Inter',monospace;
  text-shadow:0 0 40px rgba(255,255,255,0.08);
  transition:color 0.5s ease;
}
.topbar-price.pulse-up{animation:priceUp 0.6s var(--ease-out-expo)}
.topbar-price.pulse-down{animation:priceDown 0.6s var(--ease-out-expo)}
@keyframes priceUp{
  0%{text-shadow:0 0 0px rgba(0,230,160,0)}60%{text-shadow:0 0 40px rgba(0,230,160,0.6)}100%{text-shadow:0 0 40px rgba(255,255,255,0.08)}
}
@keyframes priceDown{
  0%{text-shadow:0 0 0px rgba(255,77,106,0)}60%{text-shadow:0 0 40px rgba(255,77,106,0.6)}100%{text-shadow:0 0 40px rgba(255,255,255,0.08)}
}
.topbar-change{
  font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:20px;letter-spacing:-0.2px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:all var(--duration-normal) var(--ease-out-expo);
  animation:fadeInUp 0.5s var(--ease-out-back);
}
.topbar-change.up{
  color:var(--green-bright);background:var(--green-dim);
  box-shadow:0 0 16px rgba(0,230,160,0.1);
}
.topbar-change.down{
  color:var(--red-bright);background:var(--red-dim);
  box-shadow:0 0 16px rgba(255,77,106,0.1);
}
.topbar-right{display:flex;gap:32px;align-items:center}
.topbar-stat{
  text-align:center;transition:transform var(--duration-fast) var(--ease-out-expo);
}
.topbar-stat:hover{transform:translateY(-2px)}
.topbar-stat .value{
  font-size:15px;font-weight:700;color:var(--text-primary);
  font-variant-numeric:tabular-nums;font-family:'JetBrains Mono','Inter',monospace;
  transition:color var(--duration-normal);
}
.topbar-stat .value.glow-green{text-shadow:0 0 12px rgba(0,230,160,0.3)}
.topbar-stat .value.glow-red{text-shadow:0 0 12px rgba(255,77,106,0.3)}
.topbar-stat .label{
  font-size:10px;color:var(--text-tertiary);
  letter-spacing:1px;margin-top:3px;font-weight:600;
}

/* ═══════════════════════════════════════════════════
   STATUS BAR — breathing indicator
   ═══════════════════════════════════════════════════ */

.statusbar{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:9px 0;font-size:10px;color:var(--text-tertiary);
  letter-spacing:1.5px;text-transform:uppercase;font-weight:600;
  border-bottom:1px solid var(--border-subtle);
  background:rgba(6,11,20,0.5);z-index:1;position:relative;
}
.status-dot-wrap{
  position:relative;width:8px;height:8px;display:flex;align-items:center;justify-content:center;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;display:block;position:relative;z-index:2;
}
.status-dot.live{
  background:var(--green);box-shadow:0 0 10px var(--green-glow);
  animation:dotBreathe 2s ease-in-out infinite;
}
.status-dot.warn{background:var(--gold);box-shadow:0 0 8px var(--gold-glow)}
.status-dot.dead{background:var(--red);animation:dotBlink 1s ease-in-out infinite}
.status-ring{
  position:absolute;width:14px;height:14px;border-radius:50%;
  border:1px solid rgba(0,230,160,0.3);z-index:1;
  animation:ringPulse 2s ease-in-out infinite;
}
@keyframes dotBreathe{
  0%,100%{transform:scale(1);box-shadow:0 0 10px var(--green-glow)}
  50%{transform:scale(1.4);box-shadow:0 0 20px var(--green-glow-strong)}
}
@keyframes ringPulse{
  0%,100%{transform:scale(0.8);opacity:0;border-color:rgba(0,230,160,0.3)}
  50%{transform:scale(2);opacity:0.6;border-color:rgba(0,230,160,0)}
}
@keyframes dotBlink{
  0%,100%{opacity:1}50%{opacity:0.15}
}

/* ═══════════════════════════════════════════════════
   MAIN CONTENT LAYOUT
   ═══════════════════════════════════════════════════ */

.main{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:24px 36px 48px}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;margin-top:8px;
}
.section-title{
  font-size:12px;font-weight:700;color:var(--text-tertiary);
  letter-spacing:2px;
  display:flex;align-items:center;gap:10px;
}
.section-title::before{
  content:'';width:3px;height:14px;border-radius:3px;
  background:linear-gradient(180deg,var(--gold) 0%,var(--gold-dim) 100%);
}
.section-badge{
  font-size:10px;padding:4px 14px;border-radius:20px;font-weight:600;
  background:var(--bg-elevated);color:var(--text-secondary);
  border:1px solid var(--border-subtle);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:all var(--duration-fast) var(--ease-out-expo);
}
.section-badge:hover{border-color:var(--border-hover);color:var(--text-primary)}

/* ═══════════════════════════════════════════════════
   PREDICTION CARDS — Premium Glass + Animated Border
   ═══════════════════════════════════════════════════ */

.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}

.card{
  position:relative;background:var(--bg-card);
  border:1px solid var(--border-card);
  border-radius:var(--radius-lg);padding:22px 24px;overflow:hidden;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  transition:all 0.5s var(--ease-out-expo);
  box-shadow:var(--shadow-sm);
  isolation:isolate;
}
/* Card inner glow overlay */
.card::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:-1;
  border-radius:inherit;
  transition:opacity 0.6s var(--ease-out-expo);
}
.card.up::after{
  background:radial-gradient(ellipse at 70% 20%, rgba(0,230,160,0.08) 0%, transparent 60%);
  opacity:1;
}
.card.down::after{
  background:radial-gradient(ellipse at 70% 20%, rgba(255,77,106,0.08) 0%, transparent 60%);
  opacity:1;
}
.card.leaning_up::after{
  background:radial-gradient(ellipse at 70% 20%, rgba(0,230,160,0.04) 0%, transparent 60%);
  opacity:1;
}
.card.leaning_down::after{
  background:radial-gradient(ellipse at 70% 20%, rgba(255,77,106,0.04) 0%, transparent 60%);
  opacity:1;
}
.card.neutral::after{
  background:radial-gradient(ellipse at 70% 20%, rgba(245,184,66,0.04) 0%, transparent 60%);
  opacity:1;
}

/* Animated top border glow */
.card::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
  border-radius:0 0 50% 50%;
  transition:all 0.6s var(--ease-out-expo);
  filter:blur(2px);
}
.card.up::before{
  background:linear-gradient(90deg,transparent,var(--green),transparent);
  box-shadow:0 0 24px var(--green-glow),0 2px 12px var(--green-dim);
  animation:borderShimmerGreen 3s ease-in-out infinite;
}
.card.down::before{
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  box-shadow:0 0 24px var(--red-glow),0 2px 12px var(--red-dim);
  animation:borderShimmerRed 3s ease-in-out infinite;
}
.card.leaning_up::before{
  background:linear-gradient(90deg,transparent,rgba(0,230,160,0.5),transparent);
  box-shadow:0 0 14px rgba(0,230,160,0.15);
  animation:borderShimmerGreen 3s ease-in-out infinite;
}
.card.leaning_down::before{
  background:linear-gradient(90deg,transparent,rgba(255,77,106,0.5),transparent);
  box-shadow:0 0 14px rgba(255,77,106,0.15);
  animation:borderShimmerRed 3s ease-in-out infinite;
}
.card.neutral::before{
  background:linear-gradient(90deg,transparent,rgba(245,184,66,0.35),transparent);
  box-shadow:0 0 10px rgba(245,184,66,0.1);
}

@keyframes borderShimmerGreen{
  0%,100%{opacity:0.6;left:20%;right:20%}
  50%{opacity:1;left:5%;right:5%}
}
@keyframes borderShimmerRed{
  0%,100%{opacity:0.6;left:20%;right:20%}
  50%{opacity:1;left:5%;right:5%}
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--border-glow);
  box-shadow:var(--shadow-md),0 0 60px rgba(0,0,0,0.2);
}
.card:hover::before{animation-duration:1.5s}

.card-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;
}
.card-timeframe{
  font-size:12px;letter-spacing:1px;color:var(--text-tertiary);
  font-weight:700;
}
.card-volatility{
  font-size:9px;padding:4px 12px;border-radius:20px;font-weight:700;letter-spacing:0.5px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all var(--duration-fast) var(--ease-out-expo);
}
.card-volatility.high{
  background:rgba(255,77,106,0.12);color:var(--red-bright);
  border:1px solid rgba(255,77,106,0.15);
  animation:volHighPulse 2s ease-in-out infinite;
}
.card-volatility.medium{
  background:rgba(245,184,66,0.1);color:var(--gold-bright);
  border:1px solid rgba(245,184,66,0.15);
}
.card-volatility.low{
  background:rgba(0,230,160,0.08);color:var(--green-bright);
  border:1px solid rgba(0,230,160,0.12);
}
@keyframes volHighPulse{
  0%,100%{box-shadow:0 0 0px rgba(255,77,106,0)}50%{box-shadow:0 0 12px rgba(255,77,106,0.2)}
}

.card-body{display:flex;align-items:center;gap:20px}

/* Signal icon with pulsing ring */
.card-icon-wrap{
  position:relative;width:60px;height:60px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}
.card-icon{
  width:52px;height:52px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:26px;z-index:2;position:relative;
  transition:all 0.4s var(--ease-out-expo);
}
.card-icon.up{
  background:var(--green-dim);color:var(--green-bright);
  box-shadow:0 0 30px rgba(0,230,160,0.25);
}
.card-icon.down{
  background:var(--red-dim);color:var(--red-bright);
  box-shadow:0 0 30px rgba(255,77,106,0.25);
}
.card-icon.leaning_up{background:rgba(0,230,160,0.08);color:#3df0b8}
.card-icon.leaning_down{background:rgba(255,77,106,0.08);color:#ff8096}
.card-icon.neutral{background:var(--gold-dim);color:var(--gold-bright)}
.card-icon-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:1.5px solid transparent;z-index:1;
  animation:iconRingSpin 8s linear infinite;
}
.card.up .card-icon-ring{border-color:rgba(0,230,160,0.15);border-top-color:rgba(0,230,160,0.4)}
.card.down .card-icon-ring{border-color:rgba(255,77,106,0.15);border-top-color:rgba(255,77,106,0.4)}
.card.leaning_up .card-icon-ring{border-color:rgba(0,230,160,0.08);border-top-color:rgba(0,230,160,0.2)}
.card.leaning_down .card-icon-ring{border-color:rgba(255,77,106,0.08);border-top-color:rgba(255,77,106,0.2)}
.card.neutral .card-icon-ring{border-color:rgba(245,184,66,0.1);border-top-color:rgba(245,184,66,0.25)}
@keyframes iconRingSpin{
  from{transform:rotate(0deg)}to{transform:rotate(360deg)}
}

.card:hover .card-icon{transform:scale(1.08)}
.card:hover .card-icon-ring{animation-duration:4s}

.card-info{flex:1;min-width:0}
.card-direction{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.card-direction.up{color:var(--green)}.card-direction.down{color:var(--red)}
.card-direction.leaning_up{color:#3df0b8}.card-direction.leaning_down{color:#ff8096}
.card-direction.neutral{color:var(--gold)}
.card-score{font-size:13px;color:var(--text-secondary);margin-bottom:12px}
.card-score b{font-size:22px;color:var(--text-primary);font-weight:800}
.card-confidence{display:flex;align-items:center;gap:16px}

/* Confidence ring */
.confidence-ring{position:relative;width:48px;height:48px;flex-shrink:0}
.confidence-ring svg{transform:rotate(-90deg);width:48px;height:48px}
.confidence-ring .bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:4.5}
.confidence-ring .fg{
  fill:none;stroke-width:4.5;stroke-linecap:round;
  transition:stroke-dashoffset 1.2s var(--ease-out-expo),stroke 0.6s;
  filter:drop-shadow(0 0 6px currentColor);
}
.confidence-ring .fg.up{stroke:var(--green);color:var(--green)}
.confidence-ring .fg.down{stroke:var(--red);color:var(--red)}
.confidence-ring .fg.leaning_up{stroke:#3df0b8;color:#3df0b8}
.confidence-ring .fg.leaning_down{stroke:#ff8096;color:#ff8096}
.confidence-ring .fg.neutral{stroke:var(--gold);color:var(--gold)}
.confidence-val{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:12px;font-weight:800;letter-spacing:-0.3px;
}
.confidence-val.up{color:var(--green)}.confidence-val.down{color:var(--red)}
.confidence-val.leaning_up{color:#3df0b8}.confidence-val.leaning_down{color:#ff8096}
.confidence-val.neutral{color:var(--gold)}

/* Candle status */
.card-candle{
  display:flex;align-items:center;gap:12px;margin-top:14px;
  padding-top:14px;border-top:1px solid var(--border-subtle);
  font-size:11px;color:var(--text-secondary);
}
.card-candle .label{color:var(--text-tertiary);font-size:10px;letter-spacing:0.5px;font-weight:600}
.card-candle .value{font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums}
.card-candle .divider{width:3px;height:3px;border-radius:50%;background:var(--text-muted)}

/* ═══════════════════════════════════════════════════
   METRICS GRID — Glowing stat tiles
   ═══════════════════════════════════════════════════ */

.metrics-row{
  display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;
}
.metric{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:var(--radius-md);padding:16px 12px;text-align:center;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:all 0.35s var(--ease-out-expo);
  position:relative;overflow:hidden;
  cursor:default;
}
.metric::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.02) 0%, transparent 70%);
  pointer-events:none;transition:opacity 0.3s;
  opacity:0;
}
.metric:hover{transform:translateY(-3px);border-color:var(--border-glow);box-shadow:var(--shadow-md)}
.metric:hover::after{opacity:1}
.metric-value{
  font-size:17px;font-weight:800;color:var(--text-primary);margin-bottom:6px;
  font-variant-numeric:tabular-nums;font-family:'JetBrains Mono','Inter',monospace;
  transition:all 0.5s var(--ease-out-expo);letter-spacing:-0.5px;
}
.metric-value .up{color:var(--green-bright);text-shadow:0 0 14px rgba(0,230,160,0.3)}
.metric-value .down{color:var(--red-bright);text-shadow:0 0 14px rgba(255,77,106,0.3)}
.metric-value .neutral{color:var(--gold-bright);text-shadow:0 0 14px rgba(245,184,66,0.2)}
.metric-label{
  font-size:10px;color:var(--text-tertiary);
  letter-spacing:1px;font-weight:600;
}

/* ═══════════════════════════════════════════════════
   CHARTS — Gradient fills + glow
   ═══════════════════════════════════════════════════ */

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:var(--radius-lg);padding:20px 20px 14px;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  transition:all 0.4s var(--ease-out-expo);
  box-shadow:var(--shadow-sm);
}
.chart-card:hover{border-color:var(--border-glow);box-shadow:var(--shadow-md)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-title{font-size:12px;letter-spacing:1px;color:var(--text-tertiary);font-weight:700}
.chart-indicator{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-tertiary);font-weight:600}
.chart-indicator .dot{width:9px;height:9px;border-radius:50%;display:inline-block;box-shadow:0 0 8px currentColor}
.chart-canvas-wrap{position:relative;height:280px}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important}

/* ═══════════════════════════════════════════════════
   BOTTOM PANELS
   ═══════════════════════════════════════════════════ */

.bottom-row{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;padding-bottom:24px}
.panel{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:var(--radius-lg);padding:20px 22px;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  box-shadow:var(--shadow-sm);
  transition:all 0.4s var(--ease-out-expo);
}
.panel:hover{border-color:var(--border-glow);box-shadow:var(--shadow-md)}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.panel-title{font-size:12px;letter-spacing:1px;color:var(--text-tertiary);font-weight:700}
.panel-badge{
  font-size:10px;font-weight:600;color:var(--text-secondary);
  padding:3px 10px;border-radius:12px;background:rgba(255,255,255,0.03);
  border:1px solid var(--border-subtle);
}

/* ── Prediction history grid ── */
.pred-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pred-item{
  background:rgba(6,11,20,0.6);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);padding:14px 12px 12px;
  display:flex;flex-wrap:wrap;align-items:center;gap:3px 10px;
  transition:all 0.3s var(--ease-out-expo);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.pred-item:hover{
  border-color:var(--border-hover);background:rgba(12,20,36,0.8);
  transform:translateY(-2px);box-shadow:var(--shadow-xs);
}
.pred-time{
  width:100%;font-size:9px;color:var(--text-tertiary);
  font-weight:600;letter-spacing:0.5px;
}
.pred-arrow{font-size:20px;min-width:28px;text-align:center;line-height:1;transition:transform 0.3s}
.pred-item:hover .pred-arrow{transform:scale(1.2)}
.pred-arrow.up{filter:drop-shadow(0 0 6px rgba(0,230,160,0.5))}
.pred-arrow.down{filter:drop-shadow(0 0 6px rgba(255,77,106,0.5))}
.pred-label{font-size:12px;font-weight:600}
.pred-score{
  font-size:12px;font-weight:700;color:var(--text-primary);
  margin-left:auto;font-variant-numeric:tabular-nums;
}
.pred-result{display:flex;align-items:center;gap:6px;margin-left:auto}
.pred-result .mark{font-size:16px;font-weight:700}
.pred-result .mark.win{color:var(--green);filter:drop-shadow(0 0 6px rgba(0,230,160,0.4))}
.pred-result .mark.lose{color:var(--red)}
.pred-result .sub{font-size:10px;font-weight:700;letter-spacing:0.5px}
.pred-result .sub.win{color:var(--green)}.pred-result .sub.lose{color:var(--red)}
.pred-result .pct{font-size:10px;font-weight:700}
.pred-result .pct.win{color:var(--green)}.pred-result .pct.lose{color:var(--red)}
.pred-pending{color:var(--text-muted);font-size:16px;animation:pendingPulse 2s ease-in-out infinite}
@keyframes pendingPulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* ── Factors list ── */
.factors-list{display:flex;flex-direction:column;gap:7px}
.factor-row{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  background:rgba(6,11,20,0.5);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);
  transition:all 0.3s var(--ease-out-expo);
}
.factor-row:hover{border-color:var(--border-hover);transform:translateX(4px);background:rgba(12,20,36,0.7)}
.factor-icon{
  width:28px;height:28px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:12px;
  flex-shrink:0;font-weight:700;
  transition:all 0.3s;
}
.factor-icon.pos{background:var(--green-dim);color:var(--green);box-shadow:0 0 10px rgba(0,230,160,0.1)}
.factor-icon.neg{background:var(--red-dim);color:var(--red);box-shadow:0 0 10px rgba(255,77,106,0.1)}
.factor-icon.neu{background:rgba(255,255,255,0.03);color:var(--text-tertiary)}
.factor-name{font-size:11px;font-weight:500;flex:1;color:var(--text-secondary)}
.factor-detail{font-size:9px;color:var(--text-tertiary);text-align:right;line-height:1.3;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.factor-val{
  font-size:12px;font-weight:800;color:var(--text-primary);
  font-variant-numeric:tabular-nums;min-width:40px;text-align:right;
}
.factor-val.pos{color:var(--green);text-shadow:0 0 8px rgba(0,230,160,0.2)}
.factor-val.neg{color:var(--red);text-shadow:0 0 8px rgba(255,77,106,0.2)}
.factor-bar{
  width:50px;height:4px;background:rgba(255,255,255,0.04);
  border-radius:3px;overflow:hidden;flex-shrink:0;
}
.factor-bar-fill{height:100%;border-radius:3px;transition:width 1s var(--ease-out-expo)}
.factor-bar-fill.pos{background:linear-gradient(90deg,transparent,var(--green))}
.factor-bar-fill.neg{background:linear-gradient(90deg,transparent,var(--red))}
.factor-bar-fill.neu{background:var(--text-muted)}

/* ═══════════════════════════════════════════════════
   SKELETON LOADING — Shimmer effect
   ═══════════════════════════════════════════════════ */

.skeleton{
  background:linear-gradient(90deg,var(--bg-card) 25%,rgba(255,255,255,0.03) 50%,var(--bg-card) 75%);
  background-size:200% 100%;
  animation:shimmer 1.8s ease-in-out infinite;
  border-radius:var(--radius-xs);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.no-data{
  color:var(--text-tertiary);text-align:center;padding:28px;
  font-size:13px;font-weight:500;letter-spacing:0.5px;
}

/* ═══════════════════════════════════════════════════
   ANIMATIONS — Reusable
   ═══════════════════════════════════════════════════ */

@keyframes fadeInUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(0.92)}
  to{opacity:1;transform:scale(1)}
}
.card{animation:scaleIn 0.5s var(--ease-out-back)}
.chart-card{animation:fadeInUp 0.6s var(--ease-out-expo)}
.panel{animation:fadeInUp 0.7s var(--ease-out-expo)}
.metric{animation:fadeInUp 0.5s var(--ease-out-expo)}
.metric:nth-child(1){animation-delay:0s}
.metric:nth-child(2){animation-delay:0.05s}
.metric:nth-child(3){animation-delay:0.1s}
.metric:nth-child(4){animation-delay:0.15s}
.metric:nth-child(5){animation-delay:0.2s}
.metric:nth-child(6){animation-delay:0.25s}

/* ═══════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════ */

  .topbar-left .topbar-title span{display:none}.topbar-logo{width:32px;height:32px;font-size:14px}
  .card{padding:16px 14px}.card-icon-wrap{width:50px;height:50px}.card-icon{width:42px;height:42px;font-size:22px}
  .card-direction{font-size:18px}
  .metrics-row{grid-template-columns:repeat(2,1fr);gap:6px}
  .main{padding:10px 10px 24px}
}

<body>

<!-- ═══════════════════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════════════════ -->
<script>
/* ────────────────────────────────────────────────
   PARTICLE SYSTEM — Subtle ambient particles
   ──────────────────────────────────────────────── */
(function(){
  var c=document.getElementById('particleCanvas');
  var ctx=c.getContext('2d');
  var particles=[],maxP=50;
  var w,h;

  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);

  for(var i=0;i<maxP;i++){
    particles.push({
      x:Math.random()*w,y:Math.random()*h,
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3 - 0.1,
      r:Math.random()*1.3+0.4,
      alpha:Math.random()*0.4+0.1,
      pulse:Math.random()*Math.PI*2
    });
  }

  function animate(){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      p.pulse+=0.008;
      var a=p.alpha+Math.sin(p.pulse)*0.15;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+Math.max(0.02,a)+')';
      ctx.fill();
    }
    // Occasional golden connection lines between nearby particles
    for(var i=0;i<particles.length;i+=3){
      for(var j=i+1;j<particles.length;j+=3){
        var dx=particles[i].x-particles[j].x;
        var dy=particles[i].y-particles[j].y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<140){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle='rgba(245,184,66,'+(0.03*(1-dist/140)).toFixed(3)+')';
          ctx.lineWidth=0.4;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ────────────────────────────────────────────────
   UTILITY HELPERS
   ──────────────────────────────────────────────── */
var cT=null,cL=null;
var _lastPrice=0,_priceEl=null;

function icon(d){
  if(d==='up')return '▲';if(d==='down')return '▼';
  if(d==='leaning_up')return '◗';if(d==='leaning_down')return '◖';
  return '◆';
}
function txt(d){
  if(d==='up')return '强烈看多';if(d==='down')return '强烈看空';
  if(d==='leaning_up')return '偏多';if(d==='leaning_down')return '偏空';
  return '中性';
}
function volTxt(v){var b=v/1000;if(b>=1000)return (b/1000).toFixed(1)+'M';return b.toFixed(0)+'K';}
function rsiClass(v){if(v===null||v===undefined)return'';return v>70?'down':v<30?'up':'neutral';}
function macdClass(v){if(v===null||v===undefined)return'';return v>0?'up':'down';}
function factorClass(v){if(v>0)return'pos';if(v<0)return'neg';return'neu';}

/* ────────────────────────────────────────────────
   COUNT-UP ANIMATION
   ──────────────────────────────────────────────── */
function animateValue(el,start,end,duration){
  if(!el)return;var range=end-start;var startTime=null;
  function step(ts){
    if(!startTime)startTime=ts;
    var progress=Math.min((ts-startTime)/duration,1);
    var eased=1-Math.pow(1-progress,4); // ease-out quartic
    var current=start+range*eased;
    el.textContent='$'+Number(current).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    if(progress<1)requestAnimationFrame(step);
    else el.textContent='$'+Number(end).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  requestAnimationFrame(step);
}

/* ────────────────────────────────────────────────
   MAIN UPDATE FUNCTION
   ──────────────────────────────────────────────── */
function update(d){
  if(!d)return;
  var p=d.price||0;var ch=d.change24||0;var up=ch>=0;

  // Price with animation + glow pulse
  if(!_priceEl)_priceEl=document.getElementById('price');
  var newPrice=p;
  if(_lastPrice>0 && newPrice!==_lastPrice && _priceEl){
    var pEl=_priceEl;
    pEl.className='topbar-price '+(newPrice>_lastPrice?'pulse-up':'pulse-down');
    setTimeout(function(){pEl.className='topbar-price';},700);
  }
  _lastPrice=newPrice;

  var priceEl=document.getElementById('price');
  priceEl.textContent='$'+Number(p).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  var el=document.getElementById('chg24');
  el.textContent=(up?'+':'')+Number(ch).toFixed(2)+'%';
  el.className='topbar-change '+(up?'up':'down');

  document.getElementById('high24').textContent='$'+Number(d.high24||0).toLocaleString();
  document.getElementById('low24').textContent='$'+Number(d.low24||0).toLocaleString();
  document.getElementById('vol24').textContent=(Number(d.vol24||0)/1000000).toFixed(1)+'M';

  // Status indicator
  var sd=document.getElementById('statusDot');
  var sr=document.getElementById('statusRing');
  var st=document.getElementById('statusTxt');
  if(d.error){
    sd.className='status-dot dead';sr.style.display='none';
    st.textContent='错误: '+d.error;
  }else{
    sd.className='status-dot live';sr.style.display='block';
    st.textContent='实时 · '+(d.ts||'').slice(0,19).replace('T',' ');
  }

  renderCards(d);renderStats(d);drawTrend(d.chart);drawLive(d.chart);renderFactors(d);
}

/* ────────────────────────────────────────────────
   RENDER CARDS
   ──────────────────────────────────────────────── */
function renderCards(d){
  var p5=d.pred_5m||{},p15=d.pred_15m||{};
  var h=cardHtml('5分钟','5m',p5)+cardHtml('15分钟','15m',p15);
  document.getElementById('cardsContainer').innerHTML=h;
}
function cardHtml(tf,tfk,p){
  var dir=p.direction||'neutral';var ic=icon(dir);
  var vl=p.volatility||'normal';
  var vlCls=vl==='high'?'high':vl==='low'?'low':'medium';
  var cf=Math.min(p.confidence||0,100);var sc=p.total_score||0;
  var cl=p.candle_status||'N/A';var cp=p.candle_pct||0;
  var cpTxt=cp!==0?(cp>0?'+':'')+cp.toFixed(1)+'%':'N/A';
  var r=16.5;var circ=2*Math.PI*r;var offset=circ-(cf/100)*circ;
  var vlTxt=vl==='high'?'高波动':vl==='low'?'低波动':vl==='medium'?'中波动':vl.toUpperCase();

  return '<div class="card '+dir+'" id="card'+tfk+'">'+
    '<div class="card-header"><span class="card-timeframe">'+tf+'</span><span class="card-volatility '+vlCls+'">'+vlTxt+'</span></div>'+
    '<div class="card-body">'+
    '<div class="card-icon-wrap"><div class="card-icon-ring"></div><div class="card-icon '+dir+'">'+ic+'</div></div>'+
    '<div class="card-info">'+
    '<div class="card-direction '+dir+'">'+txt(dir)+'</div>'+
    '<div class="card-score">评分 <b>'+(sc>0?'+':'')+sc+'</b></div>'+
    '<div class="card-confidence"><div class="confidence-ring">'+
    '<svg viewBox="0 0 48 48"><circle class="bg" cx="24" cy="24" r="'+r+'"/>'+
    '<circle class="fg '+dir+'" cx="24" cy="24" r="'+r+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg>'+
    '<span class="confidence-val '+dir+'">'+cf.toFixed(1)+'%</span></div></div></div></div>'+
    '<div class="card-candle"><span class="label">K线</span><span class="value">'+cl+'</span>'+
    '<span class="divider"></span><span class="label">涨跌</span><span class="value">'+cpTxt+'</span></div></div>';
}

/* ────────────────────────────────────────────────
   RENDER STATS
   ──────────────────────────────────────────────── */
function renderStats(d){
  var p5=d.pred_5m||{};var ch=d.chart||[];var last=ch.length?ch[ch.length-1]:null;
  var rsi=last&&last.rsi!==undefined?last.rsi:null;
  var macd=last&&last.macd!==undefined?last.macd:null;
  var vol=last&&last.vol!==undefined?last.vol:null;
  var pm=d.pred_market||{};var pmDir=pm.direction||'neutral';
  var h='';
  h+=statBox('RSI',rsi!==null?rsi.toFixed(1):'--',rsiClass(rsi));
  h+=statBox('MACD',macd!==null?macd.toFixed(1):'--',macdClass(macd));
  h+=statBox('成交量',vol!==null?volTxt(vol):'--','');
  h+=statBox('市场情绪',p5.direction?txt(p5.direction):'--',p5.direction||'');
  h+=statBox('预测市场',pmDir!=='neutral'?txt(pmDir):'观望',pmDir);
  h+=statBox('置信度',p5.confidence?Number(p5.confidence).toFixed(1)+'%':'--',p5.direction||'');
  document.getElementById('statsContainer').innerHTML=h;
}
function statBox(l,v,c){
  var cls=c||'';
  return '<div class="metric"><div class="metric-value"><span class="'+cls+'">'+v+'</span></div><div class="metric-label">'+l+'</div></div>';
}

/* ────────────────────────────────────────────────
   CHARTS — with gradient fills
   ──────────────────────────────────────────────── */
function drawTrend(data){
  var ctx=document.getElementById('cTrend').getContext('2d');
  if(!data||!data.length){emptyChart(ctx,cT,'cTrend');return;}
  try{
    var xl=data.map(function(c){var d=new Date(c.t);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);});
    var yl=data.map(function(c){return c.c;});
    if(cT)cT.destroy();

    // Create gradient fill
    var grad=ctx.createLinearGradient(0,0,0,280);
    grad.addColorStop(0,'rgba(245,184,66,0.18)');
    grad.addColorStop(0.5,'rgba(245,184,66,0.04)');
    grad.addColorStop(1,'rgba(245,184,66,0)');

    cT=new Chart(ctx,{type:'line',data:{labels:xl,datasets:[{
      data:yl,
      borderColor:'rgba(245,184,66,0.95)',
      borderWidth:2.2,
      pointRadius:0,pointHitRadius:10,pointHoverRadius:5,
      pointHoverBackgroundColor:'rgba(245,184,66,1)',
      pointHoverBorderColor:'#fff',
      pointHoverBorderWidth:2,
      fill:true,
      backgroundColor:grad,
      tension:0.2
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:400,easing:'easeOutQuart'},
      interaction:{intersect:false,mode:'index'},
      plugins:{legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(12,18,34,0.95)',titleColor:'#eef2f8',bodyColor:'#8892a8',
          borderColor:'rgba(255,255,255,0.1)',borderWidth:1,padding:12,cornerRadius:10,
          displayColors:false,
          callbacks:{label:function(c){return'$'+c.parsed.y.toLocaleString()}}
        }
      },
      scales:{
        x:{ticks:{color:'#4a5468',font:{size:9,family:'Inter',weight:'500'},maxTicksLimit:8,padding:4},grid:{color:'rgba(255,255,255,0.025)',drawBorder:false}},
        y:{position:'right',ticks:{color:'#4a5468',font:{size:9,family:'Inter',weight:'500'},callback:function(v){return'$'+v.toLocaleString()},padding:6},grid:{color:'rgba(255,255,255,0.025)',drawBorder:false}}
      }
    }});
  }catch(e){}
}
function drawLive(data){
  var ctx=document.getElementById('cLive').getContext('2d');
  if(!data||!data.length){emptyChart(ctx,cL,'cLive');return;}
  try{
    var d2=data.slice(-24);
    var xl=d2.map(function(c){var d=new Date(c.t);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);});
    var yl=d2.map(function(c){return c.c;});
    if(cL)cL.destroy();

    var grad=ctx.createLinearGradient(0,0,0,280);
    grad.addColorStop(0,'rgba(77,159,255,0.2)');
    grad.addColorStop(0.5,'rgba(77,159,255,0.05)');
    grad.addColorStop(1,'rgba(77,159,255,0)');

    cL=new Chart(ctx,{type:'line',data:{labels:xl,datasets:[{
      data:yl,
      borderColor:'rgba(77,159,255,0.95)',
      borderWidth:2.2,
      pointRadius:0,pointHitRadius:10,pointHoverRadius:5,
      pointHoverBackgroundColor:'rgba(77,159,255,1)',
      pointHoverBorderColor:'#fff',
      pointHoverBorderWidth:2,
      fill:true,
      backgroundColor:grad,
      tension:0.3
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:500,easing:'easeOutQuart'},
      interaction:{intersect:false,mode:'index'},
      plugins:{legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(12,18,34,0.95)',titleColor:'#eef2f8',bodyColor:'#8892a8',
          borderColor:'rgba(255,255,255,0.1)',borderWidth:1,padding:12,cornerRadius:10,
          displayColors:false,
          callbacks:{label:function(c){return'$'+c.parsed.y.toLocaleString()}}
        }
      },
      scales:{
        x:{ticks:{color:'#4a5468',font:{size:9,family:'Inter',weight:'500'},maxTicksLimit:6,padding:4},grid:{color:'rgba(255,255,255,0.025)',drawBorder:false}},
        y:{position:'right',ticks:{color:'#4a5468',font:{size:9,family:'Inter',weight:'500'},callback:function(v){return'$'+v.toLocaleString()},padding:6},grid:{color:'rgba(255,255,255,0.025)',drawBorder:false}}
      }
    }});
  }catch(e){}
}
function emptyChart(ctx,c,canvasId){
  if(c)c.destroy();var el=document.getElementById(canvasId);
  if(!el)return;var w=el.width||400,h=el.height||280;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#4a5468';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';
  ctx.fillText('等待数据...',w/2,h/2);
}

/* ────────────────────────────────────────────────
   HISTORY
   ──────────────────────────────────────────────── */
function loadHistory(){
  fetch('/api/last-predictions').then(function(r){return r.json();}).then(function(items){
    var grid=document.getElementById('histGrid');
    if(!items||!items.length){grid.innerHTML='<div class="no-data">暂无预测记录</div>';return;}
    var ev=items.filter(function(p){return p.evaluated;});
    var ok=ev.filter(function(p){return p.correct;}).length;
    var acc=ev.length?Math.round(ok/ev.length*100):null;
    var sum=document.getElementById('accSum');
    if(acc!==null){
      var c2=acc>=70?'var(--green)':acc>=50?'var(--gold)':'var(--red)';
      sum.innerHTML='准确率 <b style="color:'+c2+'">'+acc+'%</b> &nbsp;'+ok+'/'+ev.length;
    }else if(!ev.length&&items.length){
      sum.innerHTML='<span style="color:var(--text-tertiary)">等待验证...</span>';
    }else{sum.innerHTML='';}
    var h='';
    items.slice(0,8).forEach(function(p){
      var dir=p.direction||'neutral';var ic=icon(dir);
      var col=dir==='up'||dir==='leaning_up'?'var(--green)':dir==='down'||dir==='leaning_down'?'var(--red)':'var(--gold)';
      var ts=p.ts||'',time=ts.slice(11,19)||'';var sc=p.score||0;var res='';
      var arrCls=dir==='up'||dir==='leaning_up'?'up':dir==='down'||dir==='leaning_down'?'down':'';
      if(p.evaluated){
        var c=p.correct,cls2=c?'win':'lose';
        res='<div class="pred-result"><span class="mark '+cls2+'">'+(c?'✓':'✗')+'</span><span class="sub '+cls2+'">'+(c?'正确':'错误')+'</span><span class="pct '+cls2+'">'+(p.change_pct>0?'+':'')+(p.change_pct||0).toFixed(2)+'%</span></div>';
      }else{res='<span class="pred-pending">⏳</span>';}
      h+='<div class="pred-item"><div class="pred-time">'+time+' · '+p.timeframe+'</div><div class="pred-arrow '+arrCls+'" style="color:'+col+'">'+ic+'</div><div class="pred-label">'+txt(dir)+'</div><div class="pred-score">'+(sc>0?'+':'')+sc+'</div>'+res+'</div>';
    });
    grid.innerHTML=h;
  }).catch(function(){});
}

/* ────────────────────────────────────────────────
   FACTORS
   ──────────────────────────────────────────────── */
function renderFactors(d){
  var p=d.pred_5m||{};var factors=p.factors||[];var dir=p.direction||'neutral';
  document.getElementById('tfIndicator').textContent=p.total_score!==undefined?'评分: '+(p.total_score>0?'+':'')+p.total_score:'5分钟';
  var h='';
  if(!factors.length){h='<div class="no-data">等待因子数据...</div>';}
  else{
    factors.forEach(function(f){
      var cls=factorClass(f.score||0);var abs=Math.min(Math.abs(f.score||0),100);
      h+='<div class="factor-row"><div class="factor-icon '+cls+'">'+(cls==='pos'?'↑':cls==='neg'?'↓':'↔')+'</div><span class="factor-name">'+(f.name||'')+'</span><span class="factor-detail" title="'+(f.detail||'')+'">'+(f.detail||'')+'</span><span class="factor-val '+cls+'">'+(f.score>0?'+':'')+(f.score||0).toFixed(1)+'</span><div class="factor-bar"><div class="factor-bar-fill '+cls+'" style="width:'+abs+'%"></div></div></div>';
    });
  }
  document.getElementById('factorsContainer').innerHTML=h;
}

/* ────────────────────────────────────────────────
   SSE STREAM
   ──────────────────────────────────────────────── */
var es=null,tr=0;
function sse(){
  if(es)es.close();
  es=new EventSource('/api/stream');
  es.onmessage=function(e){try{var d=JSON.parse(e.data);if(d.ok!==false)update(d);tr=0;}catch(err){}}
  es.onerror=function(){tr++;if(tr>5){es.close();setInterval(function(){fetch('/api/analysis').then(function(r){return r.json();}).then(function(d){update(d);}).catch(function(){});},400);}}
  es.onopen=function(){tr=0;}
}
function start(){
  fetch('/api/analysis').then(function(r){return r.json();}).then(function(d){update(d);loadHistory();}).catch(function(){});
  sse();setInterval(loadHistory,8000);
}
document.addEventListener('DOMContentLoaded',start);
if(document.readyState==='interactive'||document.readyState==='complete')start();
</script>
